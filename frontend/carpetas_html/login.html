<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LoveArt - Multi-Option Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "electric-violet": "#8b5cf6",
              "hologram-cyan": "#06b6d4",
              "love-magenta": "#d946ef",
              "deep-void": "#030014",
            },
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      :root {
        --electric-violet: #8b5cf6;
        --hologram-cyan: #06b6d4;
        --love-magenta: #d946ef;
        --deep-void: #030014;
      }
      body {
        font-family: "Space Grotesk", sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: var(--deep-void);
      }
      .glass-button {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid var(--hologram-cyan);
        transition: all 0.3s ease;
      }
      .glass-button:active {
        transform: scale(0.96);
        background: rgba(255, 255, 255, 0.08);
      }
      .email-button {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(20px);
        border: 1px solid var(--electric-violet);
        transition: all 0.3s ease;
      }
      .email-button:active {
        transform: scale(0.96);
        background: rgba(139, 92, 246, 0.1);
      }
      .logo-glow {
        text-shadow: 0 0 20px rgba(139, 92, 246, 0.6);
      }
      .cyan-glow {
        box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
      }
      .violet-glow {
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.15);
      }
    </style>
    <style>
      body {
        min-height: max(844px, 100dvh);
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="text-white min-h-screen flex items-center justify-center p-0">
    <div
      class="w-full max-w-md h-[844px] bg-deep-void relative overflow-hidden flex flex-col font-display border-x border-white/5 shadow-2xl"
    >
      <div
        class="h-12 flex justify-between items-center px-8 text-xs font-medium opacity-60"
      >
        <span>9:41</span>
        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined text-[14px]"
            >signal_cellular_alt</span
          >
          <span class="material-symbols-outlined text-[14px]">wifi</span>
          <span class="material-symbols-outlined text-[14px]"
            >battery_very_low</span
          >
        </div>
      </div>
      <main class="flex-1 flex flex-col items-center justify-center px-10">
        <div class="flex flex-col items-center mb-20">
          <div class="w-20 h-20 mb-6 flex items-center justify-center relative">
            <div
              class="absolute inset-0 bg-electric-violet/20 blur-2xl rounded-full"
            ></div>
            <span
              class="material-symbols-outlined text-6xl text-electric-violet logo-glow font-light"
              >auto_awesome</span
            >
          </div>
          <h1
            class="text-4xl font-bold tracking-tighter text-electric-violet logo-glow"
          >
            LoveArt
          </h1>
          <p
            class="text-[10px] uppercase tracking-[0.5em] opacity-40 mt-2 font-medium"
          >
            AR Creative Studio
          </p>
        </div>
        <div class="w-full flex flex-col items-center gap-5">
          <button
            class="glass-button cyan-glow w-full py-5 rounded-2xl flex items-center justify-center gap-4 group"
          >
            <svg
              class="w-5 h-5"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"
              ></path>
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"
              ></path>
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05"
              ></path>
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"
                fill="#EA4335"
              ></path>
            </svg>
            <span class="text-sm font-medium tracking-wide"
              >Continue with Google</span
            >
          </button>
          <div class="flex items-center w-full gap-4 py-2">
            <div class="h-[1px] flex-1 bg-white/5"></div>
            <span
              class="text-[10px] uppercase tracking-[0.2em] text-white/30 font-bold"
              >or</span
            >
            <div class="h-[1px] flex-1 bg-white/5"></div>
          </div>
          <button
            class="email-button violet-glow w-full py-5 rounded-2xl flex items-center justify-center gap-4 group"
          >
            <span class="material-symbols-outlined text-xl text-electric-violet"
              >mail</span
            >
            <span class="text-sm font-medium tracking-wide"
              >Login with Email</span
            >
          </button>
        </div>
      </main>
      <footer class="pb-16 flex flex-col items-center gap-8">
        <a
          class="text-love-magenta text-xs font-medium tracking-wide hover:opacity-80 transition-opacity"
          href="#"
        >
          New here? Sign up with Google
        </a>
        <div class="w-32 h-1 bg-white/10 rounded-full"></div>
      </footer>
      <div
        class="absolute -top-20 -left-20 w-64 h-64 bg-electric-violet/5 blur-[100px] rounded-full pointer-events-none"
      ></div>
      <div
        class="absolute top-1/2 -right-20 w-64 h-64 bg-hologram-cyan/5 blur-[100px] rounded-full pointer-events-none"
      ></div>
    </div>
  </body>
</html>
