<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LoveARt Email Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#8b5cf6",
              "hologram-cyan": "#06b6d4",
              "love-magenta": "#d946ef",
              "background-light": "#f6f5f8",
              "background-dark": "#030014",
            },
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #030014;
        font-family: "Space Grotesk", sans-serif;
      }
      .input-glow:focus {
        box-shadow: 0 4px 12px -2px rgba(6, 182, 212, 0.3);
      }
      .bg-void {
        background: radial-gradient(
          circle at top center,
          #151022 0%,
          #030014 70%
        );
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col items-center justify-between p-6"
  >
    <!-- Top Navigation / Status Bar Area -->
    <div class="w-full flex justify-between items-center pt-2 pb-8">
      <button class="text-slate-400 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">arrow_back_ios</span>
      </button>
      <div class="h-1 w-12 bg-slate-800 rounded-full"></div>
      <div class="w-8"></div>
      <!-- Spacer for balance -->
    </div>
    <!-- Main Content Container -->
    <div
      class="w-full max-w-md flex-1 flex flex-col items-center justify-center space-y-12"
    >
      <!-- Logo and Title Section -->
      <div class="text-center space-y-6">
        <div class="relative inline-block">
          <div
            class="absolute inset-0 bg-primary/20 blur-2xl rounded-full"
          ></div>
          <span class="material-symbols-outlined text-primary text-7xl relative"
            >favorite</span
          >
        </div>
        <div class="space-y-2">
          <h1 class="text-primary text-4xl font-bold tracking-tight">
            Welcome Back
          </h1>
          <p
            class="text-slate-400 text-sm font-light tracking-widest uppercase"
          >
            LoveARt Studio
          </p>
        </div>
      </div>
      <!-- Login Form -->
      <form class="w-full space-y-8" onsubmit="return false;">
        <div class="space-y-6">
          <!-- Email Field -->
          <div class="relative group">
            <label
              class="block text-slate-500 text-xs font-medium uppercase tracking-widest mb-1 ml-1"
              >Email Address</label
            >
            <input
              class="w-full bg-transparent border-t-0 border-x-0 border-b border-slate-800 focus:border-hologram-cyan focus:ring-0 transition-all duration-300 py-3 px-1 text-lg placeholder:text-slate-700 input-glow"
              placeholder="creative@studio.ar"
              type="email"
            />
          </div>
          <!-- Password Field -->
          <div class="relative group">
            <div class="flex justify-between items-end mb-1 px-1">
              <label
                class="block text-slate-500 text-xs font-medium uppercase tracking-widest"
                >Password</label
              >
              <a
                class="text-love-magenta text-xs font-medium hover:brightness-125 transition-all"
                href="#"
                >Forgot Password?</a
              >
            </div>
            <div class="relative">
              <input
                class="w-full bg-transparent border-t-0 border-x-0 border-b border-slate-800 focus:border-hologram-cyan focus:ring-0 transition-all duration-300 py-3 px-1 text-lg placeholder:text-slate-700 input-glow"
                placeholder="••••••••"
                type="password"
              />
              <span
                class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-slate-600 text-xl cursor-pointer hover:text-slate-400"
                >visibility</span
              >
            </div>
          </div>
        </div>
        <!-- Login Button -->
        <div class="pt-4">
          <button
            class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98] flex items-center justify-center space-x-2"
          >
            <span>Log In</span>
            <span class="material-symbols-outlined text-lg">bolt</span>
          </button>
        </div>
      </form>
      <!-- Biometric / Alternative Section -->
      <div class="flex flex-col items-center space-y-4">
        <button
          class="flex items-center space-x-2 text-slate-500 hover:text-hologram-cyan transition-colors group"
        >
          <span
            class="material-symbols-outlined text-3xl group-active:scale-110 transition-transform"
            >fingerprint</span
          >
          <span class="text-xs font-medium uppercase tracking-widest"
            >Sign in with FaceID</span
          >
        </button>
      </div>
    </div>
    <!-- Footer Area -->
    <div class="w-full pt-12 pb-4 text-center">
      <button
        class="text-slate-500 hover:text-primary transition-colors text-sm font-medium tracking-wide flex items-center justify-center mx-auto space-x-1"
      >
        <span class="material-symbols-outlined text-base">apps</span>
        <span>Back to Options</span>
      </button>
      <div class="mt-8 flex justify-center space-x-1">
        <div class="h-1 w-24 bg-slate-800 rounded-full overflow-hidden">
          <div class="h-full w-1/3 bg-primary rounded-full"></div>
        </div>
      </div>
    </div>
    <!-- Ambient Background Elements -->
    <div
      class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full pointer-events-none"
    ></div>
    <div
      class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-love-magenta/5 blur-[120px] rounded-full pointer-events-none"
    ></div>
  </body>
</html>
